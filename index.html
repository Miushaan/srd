<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD PRF TRACKING | 2026 OFFICIAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; --side: #0f172a; --brand: #6366f1; --brand-light: #e0e7ff; 
            --success: #10b981; --border: #e2e8f0; --text-main: #1e293b; 
            --text-muted: #64748b; --danger: #f43f5e; --warning: #f59e0b; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Navigation */
        .sidebar { width: 260px; background: var(--side); color: white; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; z-index: 100; }
        .logo-box { margin-bottom: 50px; padding-left: 15px; border-left: 3px solid var(--brand); }
        .logo-box h1 { font-size: 14px; font-weight: 800; line-height: 1.2; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-btn { width: 100%; padding: 14px 18px; border-radius: 12px; border: none; background: transparent; color: #94a3b8; font-weight: 600; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 8px; text-transform: uppercase; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }

        .presence-box { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; }
        .u-row { font-size: 10px; color: #cbd5e1; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .u-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* Main Wrapper */
        .wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .top-bar { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; }
        
        .header-info { flex-shrink: 0; }
        .header-info h2 { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }

        .search-wrap { flex: 1; max-width: 400px; }
        .search-wrap input { width: 100%; padding: 12px 20px; border-radius: 14px; border: 1px solid var(--border); background: #f1f5f9; font-size: 13px; font-family: inherit; }

        .action-group { display: flex; gap: 10px; margin-left: auto; }

        /* Content Area */
        .main-content { flex: 1; padding: 30px 40px; overflow: auto; }
        .table-container { background: white; border-radius: 20px; box-shadow: 0 4px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--border); overflow: hidden; }

        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 18px 20px; text-align: left; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        tbody td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }

        .status-select { padding: 8px; border-radius: 10px; font-size: 10px; font-weight: 800; width: 150px; border: none; cursor: pointer; text-align: center; }
        
        /* Status Themes */
        .s-PENDING { background: #f1f5f9; color: #475569; }
        .s-ITEM-CREATION { background: #e0e7ff; color: #4338ca; }
        .s-PR-MTR-RAISED { background: #fef9c3; color: #854d0e; }
        .s-PO-RAISED { background: #dcfce7; color: #166534; }
        .s-PAYMENT-PENDING { background: #ffedd5; color: #9a3412; }
        .s-PART-RECEIVED { background: #f0fdf4; color: #15803d; border: 1px dashed #10b981; }
        .s-ALL-RECEIVED { background: var(--success); color: white; }
        .s-OH-HOLD { background: #fee2e2; color: #991b1b; }
        .s-CANCELLED { background: #1e293b; color: white; }

        .remarks-editor { width: 100%; min-width: 250px; min-height: 38px; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 12px; border: 1px solid transparent; }
        .remarks-editor:focus { background: white; border-color: var(--brand); }
        
        .cd-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; margin-top: 5px; }
        .cd-overdue { background: #fff1f2; color: var(--danger); }
        .cd-ok { background: #f0fdf4; color: var(--success); }

        /* Components */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: white; padding: 40px; border-radius: 24px; width: 500px; }
        .btn-main { padding: 12px 20px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div style="background: white; padding: 50px; border-radius: 30px; width: 400px; text-align: center;">
            <h2 style="font-weight: 800; margin-bottom: 25px;">SYSTEM ACCESS</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:1px solid var(--border);">
            <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:1px solid var(--border);">
            <button onclick="handleLogin()" class="btn-main btn-primary" style="width:100%; justify-content: center;">Authenticate</button>
            <p id="auth-error" style="color:var(--danger); font-size:11px; margin-top:15px; font-weight:800;"></p>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo-box"><h1>SRD PRF<br>PORTAL 2026</h1></div>
        
        <div style="flex: 1;">
            <button id="nav-dash" onclick="switchPage('DASH')" class="nav-btn active">Live Dashboard</button>
            <button id="nav-comp" onclick="switchPage('COMP')" class="nav-btn">Archive</button>
        </div>

        <div class="presence-box">
            <div id="online-list"></div>
        </div>

        <button onclick="handleLogout()" class="nav-btn" style="color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2);">Sign Out</button>
    </nav>

    <div class="wrapper">
        <header class="top-bar">
            <div class="header-info">
                <h2 id="page-title">LIVE DASHBOARD</h2>
            </div>

            <div class="search-wrap">
                <input type="text" id="main-search" placeholder="Search records..." onkeyup="refreshTable()">
            </div>

            <div class="action-group">
                <button onclick="showAudit()" class="btn-main btn-outline">Audit Trail</button>
                <button onclick="exportPDF()" class="btn-main btn-outline">Export PDF</button>
                <button onclick="openModal()" class="btn-main btn-primary">+ Create Entry</button>
            </div>
        </header>

        <main class="main-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">Date</th>
                            <th style="width: 120px;">PRF #</th>
                            <th style="width: 200px;">Asset Name</th>
                            <th style="width: 100px;">Workshop</th>
                            <th style="width: 160px;">Status</th>
                            <th style="width: 180px;">Due Date</th>
                            <th>Remarks</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="prf-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 style="margin-bottom:25px; font-weight: 800;">NEW ENTRY</h2>
            <input type="text" id="m-prf" placeholder="PRF NUMBER" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:1px solid var(--border);">
            <input type="text" id="m-asset" placeholder="ASSET NAME" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:1px solid var(--border);">
            <select id="m-workshop" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:1px solid var(--border);">
                <option value="">-- SELECT WORKSHOP --</option>
                <option value="DAU/LOS">DAU/LOS</option><option value="EEW">EEW</option><option value="MRW">MRW</option>
                <option value="MSH">MSH</option><option value="MWU">MWU</option><option value="NMU">NMU</option>
                <option value="OSU">OSU</option><option value="PLU">PLU</option><option value="SMU">SMU</option>
                <option value="STU">STU</option><option value="ADM">ADM</option><option value="INV">INV</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button onclick="savePRF(false)" class="btn-main btn-outline" style="justify-content:center;">Draft</button>
                <button onclick="savePRF(true)" class="btn-main btn-primary" style="justify-content:center;">Upload & Link</button>
            </div>
        </div>
    </div>

    <div id="audit-modal" class="overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal" style="width: 650px; max-height: 80vh; display: flex; flex-direction: column;">
            <h2 style="margin-bottom:20px; font-weight:800;">AUDIT TRAIL</h2>
            <div id="audit-content" style="overflow-y:auto; flex:1; border-top:1px solid #eee; padding-top:10px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw", 
            authDomain: "srd-portal-1234.firebaseapp.com", 
            projectId: "srd-portal-1234", 
            databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com",
            storageBucket: "srd-portal-1234.firebasestorage.app", 
            messagingSenderId: "286585731956", 
            appId: "1:286585731956:web:47641bcf34033b014f4a21" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let logs = [], auditLogs = [], currentPage = 'DASH';
        const STATUS_OPTIONS = ["PENDING", "ITEM CREATION", "PR/MTR-RAISED", "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", "ALL RECEIVED", "OH-HOLD", "CANCELLED"];

        // Auth
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(() => alert("Access Denied"));
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) { initData(); setupPresence(user); }
        });

        function setupPresence(user) {
            const myStatusRef = ref(db, `/status/${user.uid}`);
            onValue(ref(db, '.info/connected'), (snap) => { if (snap.val()) { onDisconnect(myStatusRef).set({ state: 'offline', email: user.email }).then(() => set(myStatusRef, { state: 'online', email: user.email })); }});
            onValue(ref(db, '/status'), (snap) => {
                const data = snap.val(); let html = '';
                for (let id in data) if (data[id].state === 'online') html += `<div class="u-row"><span class="u-dot"></span>${data[id].email.split('@')[0].toUpperCase()}</div>`;
                document.getElementById('online-list').innerHTML = html;
            });
        }

        function initData() {
            onValue(ref(db, 'prf_logs'), snap => {
                const val = snap.val();
                logs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                logs.sort((a,b) => new Date(b.rawDate || 0) - new Date(a.rawDate || 0));
                refreshTable();
            });
            onValue(ref(db, 'audit_trail'), snap => {
                const val = snap.val();
                auditLogs = val ? Object.values(val).reverse() : [];
            });
        }

        window.switchPage = (page) => {
            currentPage = page;
            document.getElementById('nav-dash').classList.toggle('active', page === 'DASH');
            document.getElementById('nav-comp').classList.toggle('active', page === 'COMP');
            document.getElementById('page-title').innerText = page === 'DASH' ? 'LIVE DASHBOARD' : 'ARCHIVE';
            refreshTable();
        };

        function getCountdown(etaStr) {
            if (!etaStr) return '';
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(etaStr); due.setHours(0,0,0,0);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff === 0) return `<span class="cd-badge" style="background:#fff7ed; color:#c2410c;">DUE TODAY</span>`;
            if (diff < 0) return `<span class="cd-badge cd-overdue">${Math.abs(diff)}D OVERDUE</span>`;
            return `<span class="cd-badge cd-ok">${diff}D REMAINING</span>`;
        }

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const filtered = logs.filter(l => {
                const matches = (l.prf?.includes(q) || l.asset?.includes(q) || l.workshop?.includes(q));
                return currentPage === 'DASH' ? (matches && l.status !== 'ALL RECEIVED') : (matches && l.status === 'ALL RECEIVED');
            });

            document.getElementById('table-body').innerHTML = filtered.map(l => {
                const sClass = `s-${l.status.replace(/[/ ]/g, '-')}`;
                return `
                    <tr>
                        <td>${l.date}</td>
                        <td style="font-weight:800; color:var(--brand);">${l.prf}</td>
                        <td style="font-weight:700;">${l.asset}</td>
                        <td style="font-size:10px; font-weight:700; color:var(--text-muted);">${l.workshop}</td>
                        <td>
                            <select class="status-select ${sClass}" onchange="updateField('${l.id}', 'status', this.value, '${l.prf}')">
                                ${STATUS_OPTIONS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}
                            </select>
                        </td>
                        <td>
                            <input type="date" value="${l.eta || ''}" onchange="updateField('${l.id}', 'eta', this.value, '${l.prf}')" style="padding:5px; border:1px solid #eee; border-radius:5px; font-family:inherit;">
                            ${getCountdown(l.eta)}
                        </td>
                        <td><div class="remarks-editor" contenteditable="true" onblur="updateField('${l.id}', 'remarks', this.innerText.toUpperCase(), '${l.prf}')">${l.remarks || ''}</div></td>
                        <td><button onclick="deleteRow('${l.id}')" style="background:none; border:none; cursor:pointer; color:#cbd5e1; font-size:18px;">&times;</button></td>
                    </tr>
                `;
            }).join('');
        };

        window.updateField = (id, field, val, prf) => {
            if (field === 'status' && val === 'ALL RECEIVED' && !confirm('Move to Archive?')) { refreshTable(); return; }
            update(ref(db, `prf_logs/${id}`), { [field]: val });
            push(ref(db, 'audit_trail'), { time: new Date().toLocaleString(), user: auth.currentUser.email.split('@')[0].toUpperCase(), action: `Edit ${field}`, prf: prf, details: val });
        };

        window.savePRF = (redirect) => {
            const p = document.getElementById('m-prf').value.toUpperCase(), a = document.getElementById('m-asset').value.toUpperCase(), w = document.getElementById('m-workshop').value;
            if(!p || !a || !w) return alert("Required");
            push(ref(db, 'prf_logs'), { date: new Date().toLocaleDateString('en-GB'), rawDate: new Date().toISOString(), prf: p, asset: a, workshop: w, status: 'PENDING', eta: '', remarks: '' });
            closeModal();
            if(redirect) window.open("https://forms.office.com/pages/responsepage.aspx?id=rS-35FLkcEy4rMmBiUUcM-wq0ZU8I9BHssORFyfEW95UN0ZMM1gxR1YwUDZKMkNHMkhFMUdMRzlRSS4u", "_blank");
        };

        window.showAudit = () => {
            document.getElementById('audit-modal').style.display = 'flex';
            document.getElementById('audit-content').innerHTML = auditLogs.map(a => `<div style="font-size:11px; padding:12px; border-bottom:1px solid #f1f5f9;"><span style="color:var(--text-muted);">${a.time}</span> | <b>${a.user}</b>: ${a.prf} (${a.action} ➔ ${a.details})</div>`).join('');
        };

        window.deleteRow = (id) => { if(confirm('Delete permanently?')) remove(ref(db, `prf_logs/${id}`)); };
        window.openModal = () => document.getElementById('prf-modal').style.display = 'flex';
        window.closeModal = () => { document.getElementById('prf-modal').style.display = 'none'; };

        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const data = logs.filter(l => l.status !== 'ALL RECEIVED').map(l => [l.date, l.prf, l.asset, l.workshop, l.status, l.eta || 'N/A', l.remarks || '']);
            doc.text("SRD PRF STATUS REPORT", 14, 15);
            doc.setFontSize(10);
            doc.text(`Report Date: ${new Date().toLocaleDateString('en-GB')}`, 14, 22);
            doc.autoTable({ startY: 28, head: [['DATE', 'PRF #', 'ASSET', 'W.SHOP', 'STATUS', 'DUE DATE', 'REMARKS']], body: data, theme: 'grid', styles: { fontSize: 7 }, headStyles: { fillStyle: [99, 102, 241] }});
            doc.save(`SRD_Report_${new Date().toISOString().split('T')[0]}.pdf`);
        };
    </script>
</body>
</html>
