<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRF LOG | SECURE PORTAL 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc; --brand: #2563eb; --success: #10b981; --navy: #0f172a;
            --border: #e2e8f0; --glass: rgba(255, 255, 255, 0.9);
            --danger: #ef4444; --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Authentication Overlay */
        .auth-wrapper { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #f1f5f9; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; }

        /* Header */
        .glass-header { background: var(--glass); backdrop-filter: blur(12px); padding: 20px 30px; border-bottom: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-area h1 { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .logo-area span { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; }

        /* Table Architecture */
        .content-area { flex-grow: 1; overflow: auto; padding: 20px 30px; }
        .table-card { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; table-layout: fixed; }
        
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 16px; text-align: left; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 1px solid var(--border); z-index: 10; }
        tbody td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }

        /* Column Widths */
        .w-date { width: 110px; }
        .w-prf { width: 140px; }
        .w-asset { width: 220px; }
        .w-wk { width: 100px; }
        .w-status { width: 175px; }
        .w-eta { width: 160px; }
        .w-remarks { width: auto; } 
        .w-del { width: 50px; }

        /* Status Pills */
        .status-pill { padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 800; width: 100%; border: none; cursor: pointer; appearance: none; text-align: center; }
        .s-PENDING { background: #f1f5f9; color: #475569; }
        .s-ITEM { background: #fef9c3; color: #854d0e; }
        .s-PR { background: #e0f2fe; color: #075985; }
        .s-PO { background: #dcfce7; color: #166534; }
        .s-PAYMENT { background: #fae8ff; color: #86198f; }
        .s-PART { background: #ffedd5; color: #9a3412; }
        .s-ALL { background: #10b981; color: white; }
        .s-HOLD { background: #475569; color: white; }
        .s-CANCELLED { background: #fee2e2; color: #991b1b; }

        /* Countdown Labels */
        .cd-text { display: block; font-size: 10px; font-weight: 800; margin-top: 5px; }
        .cd-overdue { color: var(--danger); }
        .cd-today { color: var(--warning); padding: 2px 4px; border: 1px solid var(--warning); border-radius: 4px; display: inline-block; }
        .cd-ok { color: var(--success); }

        textarea { width: 100%; border: 1px solid transparent; border-radius: 8px; padding: 8px; font-size: 12px; resize: vertical; min-height: 45px; background: #f8fafc; font-family: inherit; line-height: 1.4; }
        textarea:focus { background: white; border-color: var(--border); }

        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-white { background: white; border: 1px solid var(--border); color: var(--navy); }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal { background: white; padding: 32px; border-radius: 20px; width: 440px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="auth-overlay" class="auth-wrapper">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 25px;">
                <span style="font-size:12px; color:#64748b; font-weight:800;">SRD CONTROL CENTER</span>
                <h1 style="font-size: 24px; letter-spacing:-1px;">Portal Login</h1>
            </div>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn" class="btn btn-primary" style="width: 100%; justify-content: center;">SIGN IN</button>
            <p id="auth-error" style="color:#ef4444; font-size:11px; margin-top:15px; text-align:center; font-weight:700"></p>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-main">
            <div class="logo-area">
                <span>Operational Control 2026</span>
                <h1>PRF TRACKING PORTAL</h1>
            </div>
            <div style="display:flex; gap:12px">
                <button onclick="showAudit()" class="btn btn-white">Audit Logs</button>
                <button onclick="exportPDF()" class="btn btn-white">Export PDF</button>
                <button onclick="openModal()" class="btn btn-primary">+ New Entry</button>
                <button onclick="handleLogout()" class="btn btn-white" style="color:#ef4444; border-color:#fee2e2">Logout</button>
            </div>
        </div>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="main-search" placeholder="Search PRF, Asset, Workshop..." onkeyup="refreshTable()">
            </div>
        </div>
    </header>

    <main class="content-area">
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th class="w-date">Date</th>
                        <th class="w-prf">PRF Number</th>
                        <th class="w-asset">Asset Name</th>
                        <th class="w-wk">Workshop</th>
                        <th class="w-status">Status</th>
                        <th class="w-eta">Due Date</th>
                        <th class="w-remarks">Remarks (Detailed)</th>
                        <th class="w-del"></th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="prf-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 style="margin-bottom:20px; letter-spacing:-0.5px">Add PRF Record</h2>
            <input type="text" id="m-prf" placeholder="PRF NUMBER" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
            <input type="text" id="m-asset" placeholder="ASSET NAME" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border);">
            <select id="m-workshop" style="width:100%; padding:14px; margin-bottom:25px; border-radius:10px; border:1px solid var(--border); font-family:inherit; font-weight:600">
                <option value="">-- SELECT WORKSHOP --</option>
                <option value="DAU/LOS">DAU/LOS</option>
                <option value="EEW">EEW</option>
                <option value="MRW">MRW</option>
                <option value="MSH">MSH</option>
                <option value="MWU">MWU</option>
                <option value="NMU">NMU</option>
                <option value="OSU">OSU</option>
                <option value="PLU">PLU</option>
                <option value="SMU">SMU</option>
                <option value="STU">STU</option>
                <option value="ADM">ADM</option>
                <option value="INV">INV</option>
            </select>
            <div style="display:flex; gap:10px;">
                <button onclick="savePRF(false)" class="btn btn-primary" style="flex:1; justify-content:center;">SAVE</button>
                <button onclick="savePRF(true)" class="btn btn-success" style="flex:1.5; justify-content:center;">SAVE & UPLOAD</button>
            </div>
        </div>
    </div>

    <div id="log-modal" class="overlay" onclick="this.style.display='none'">
        <div class="modal" style="max-width:650px; max-height:80vh; display:flex; flex-direction:column">
            <h3 style="margin-bottom:15px">System Audit Trail</h3>
            <div id="log-content" style="overflow-y:auto; flex-grow:1; border-top:1px solid #eee"></div>
            <button class="btn btn-white" style="margin-top:15px; width:100%; justify-content:center">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw",
            authDomain: "srd-portal-1234.firebaseapp.com",
            projectId: "srd-portal-1234",
            storageBucket: "srd-portal-1234.firebasestorage.app",
            messagingSenderId: "286585731956",
            appId: "1:286585731956:web:47641bcf34033b014f4a21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let logs = [], auditData = [];

        const STATUS_OPTIONS = [
            "PENDING", "ITEM CREATION", "PR/MTR-RAISED", 
            "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", 
            "ALL RECEIVED", "OH-HOLD", "CANCELLED"
        ];

        window.handleLogin = () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => document.getElementById('auth-error').textContent = "INVALID ACCESS");
        };
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) initData();
        });

        function initData() {
            onValue(ref(db, 'prf_logs'), snap => {
                const val = snap.val();
                logs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                logs.sort((a,b) => new Date(b.rawDate || 0) - new Date(a.rawDate || 0));
                refreshTable();
            });
            onValue(ref(db, 'audit_trail'), snap => {
                const val = snap.val();
                auditData = val ? Object.values(val).reverse() : [];
            });
        }

        function getStatusClass(s) {
            if (s.includes('ITEM')) return 's-ITEM';
            if (s.includes('PR/')) return 's-PR';
            if (s.includes('PO-')) return 's-PO';
            if (s.includes('PAYMENT')) return 's-PAYMENT';
            if (s.includes('PART')) return 's-PART';
            if (s.includes('ALL')) return 's-ALL';
            if (s.includes('HOLD')) return 's-HOLD';
            if (s.includes('CANCELLED')) return 's-CANCELLED';
            return 's-PENDING';
        }

        function calculateCountdown(etaStr) {
            if (!etaStr) return '';
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const due = new Date(etaStr);
            due.setHours(0, 0, 0, 0);
            
            const diffTime = due.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return `<span class="cd-text cd-today">DUE TODAY</span>`;
            if (diffDays < 0) return `<span class="cd-text cd-overdue">${Math.abs(diffDays)} DAYS OVERDUE</span>`;
            return `<span class="cd-text cd-ok">${diffDays} DAYS REMAINING</span>`;
        }

        window.savePRF = (redirect) => {
            const p = document.getElementById('m-prf').value.toUpperCase();
            const a = document.getElementById('m-asset').value.toUpperCase();
            const w = document.getElementById('m-workshop').value;
            if(!p || !a || !w) return alert("Please fill all required fields.");

            push(ref(db, 'prf_logs'), {
                date: new Date().toLocaleDateString('en-GB'),
                rawDate: new Date().toISOString(),
                prf: p, asset: a, workshop: w, 
                status: 'PENDING', eta: '', remarks: ''
            });
            
            push(ref(db, 'audit_trail'), {
                time: new Date().toLocaleString(),
                user: auth.currentUser.email,
                action: "CREATE", prf: p, details: `Added to ${w}`
            });

            closeModal();

            if(redirect) {
                window.open("https://forms.office.com/pages/responsepage.aspx?id=rS-35FLkcEy4rMmBiUUcM-wq0ZU8I9BHssORFyfEW95UN0ZMM1gxR1YwUDZKMkNHMkhFMUdMRzlRSS4u&route=shorturl", "_blank");
            }
        };

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const filtered = logs.filter(l => 
                (l.prf?.toUpperCase().includes(q)) || (l.asset?.toUpperCase().includes(q)) || (l.workshop?.toUpperCase().includes(q))
            );
            
            const body = document.getElementById('table-body');
            body.innerHTML = filtered.map(l => `
                <tr>
                    <td class="w-date"><b>${l.date}</b></td>
                    <td class="w-prf" style="color:var(--brand); font-weight:800">${l.prf}</td>
                    <td class="w-asset" style="font-weight:600; color:#334155">${l.asset}</td>
                    <td class="w-wk" style="font-weight:800; color:#64748b; font-size:11px">${l.workshop}</td>
                    <td class="w-status">
                        <select class="status-pill ${getStatusClass(l.status)}" onchange="updateField('${l.id}', 'status', this.value, '${l.prf}')">
                            ${STATUS_OPTIONS.map(opt => `<option value="${opt}" ${l.status === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td class="w-eta">
                        <input type="date" style="border:none; background:#f1f5f9; font-size:12px; padding:5px; border-radius:4px; width:100%" 
                               value="${l.eta || ''}" onchange="updateField('${l.id}', 'eta', this.value, '${l.prf}')">
                        ${calculateCountdown(l.eta)}
                    </td>
                    <td class="w-remarks"><textarea onchange="updateField('${l.id}', 'remarks', this.value.toUpperCase(), '${l.prf}')">${l.remarks||''}</textarea></td>
                    <td class="w-del"><button onclick="deleteRow('${l.id}', '${l.prf}')" style="background:none; border:none; color:#cbd5e1; cursor:pointer; font-size:18px">×</button></td>
                </tr>
            `).join('');
        };

        window.updateField = (id, field, val, prf) => {
            update(ref(db, `prf_logs/${id}`), { [field]: val });
            push(ref(db, 'audit_trail'), {
                time: new Date().toLocaleString(),
                user: auth.currentUser.email,
                action: "UPDATE", prf: prf, details: `Updated ${field}`
            });
        };

        window.deleteRow = (id, prf) => {
            if(confirm(`Confirm deletion of PRF ${prf}?`)) {
                remove(ref(db, `prf_logs/${id}`));
                push(ref(db, 'audit_trail'), {
                    time: new Date().toLocaleString(),
                    user: auth.currentUser.email,
                    action: "DELETE", prf: prf, details: "Record deleted"
                });
            }
        };

        window.showAudit = () => {
            document.getElementById('log-modal').style.display = 'flex';
            document.getElementById('log-content').innerHTML = auditData.map(a => `
                <div style="padding:12px; border-bottom:1px solid #f1f5f9; font-size:11px">
                    <b style="color:var(--brand)">${a.time}</b> | <b>${a.user}</b><br/>
                    <span style="color:var(--danger); font-weight:800">${a.action}</span> - PRF: ${a.prf} (${a.details})
                </div>
            `).join('');
        };

        window.openModal = () => document.getElementById('prf-modal').style.display = 'flex';
        window.closeModal = () => {
            document.getElementById('prf-modal').style.display = 'none';
            document.getElementById('m-prf').value = '';
            document.getElementById('m-asset').value = '';
        };

        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(18);
            doc.text("PRF STATUS SUMMARY - 2026", 14, 15);
            doc.autoTable({ 
                startY: 22,
                head: [['DATE', 'PRF #', 'ASSET', 'WORKSHOP', 'STATUS', 'DUE DATE', 'REMARKS']],
                body: logs.map(l => [l.date, l.prf, l.asset, l.workshop, l.status, l.eta, l.remarks]),
                headStyles: { fillColor: [15, 23, 42], fontSize: 8 },
                styles: { fontSize: 8, cellPadding: 3 },
                columnStyles: { 6: { cellWidth: 80 } }
            });
            doc.save(`PRF_REPORT_2026.pdf`);
        };
    </script>
</body>
</html>
