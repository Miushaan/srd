<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD PORTAL | 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; 
            --side: #0f172a; 
            --brand: #6366f1; 
            --brand-light: #e0e7ff; 
            --success: #10b981; 
            --border: #cbd5e1; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --danger: #f43f5e; 
            --warning: #f59e0b; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { 
            width: 260px; 
            background: var(--side); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            padding: 40px 20px; 
            flex-shrink: 0; 
            z-index: 100; 
            border-right: 2px solid rgba(255,255,255,0.1); 
            transition: margin-left 0.3s ease;
        }
        .sidebar.hidden { margin-left: -260px; }
        
        .logo-box { margin-bottom: 50px; padding-left: 15px; border-left: 4px solid var(--brand); }
        .logo-box h1 { font-size: 14px; font-weight: 800; line-height: 1.2; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-btn { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid transparent; background: transparent; color: #94a3b8; font-weight: 600; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 8px; text-transform: uppercase; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); border-color: rgba(255,255,255,0.2); }

        .presence-box { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(4px); }
        .u-row { font-size: 10px; color: #cbd5e1; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .u-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        .wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .top-bar { padding: 20px 40px; background: white; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 20px; }
        
        .hamburger { background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; padding: 5px; border-radius: 8px; transition: 0.2s; margin-right: 5px; }
        .hamburger:hover { background: var(--bg); }

        .header-info { flex-shrink: 0; }
        .header-info h2 { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }

        .search-wrap { flex: 1; max-width: 400px; }
        .search-wrap input { width: 100%; padding: 12px 20px; border-radius: 14px; border: 2px solid var(--border); background: #ffffff; font-size: 13px; font-family: inherit; transition: 0.2s; }
        .search-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-light); }

        .action-group { display: flex; gap: 10px; margin-left: auto; }

        .main-content { flex: 1; padding: 30px 40px; overflow: auto; }
        .table-container { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 2px solid var(--border); overflow: hidden; }

        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #f1f5f9; padding: 18px 20px; text-align: left; font-size: 10px; font-weight: 800; color: var(--text-main); text-transform: uppercase; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); z-index: 10; }
        tbody td { padding: 12px 20px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody td:last-child, thead th:last-child { border-right: none; }

        .status-select { padding: 8px; border-radius: 10px; font-size: 10px; font-weight: 800; width: 140px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        
        .s-PENDING, .s-Undocked { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .s-ITEM-CREATION { background: #e0e7ff; color: #4338ca; border-color: #c7d2fe; }
        .s-PR-MTR-RAISED { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
        .s-PO-RAISED, .s-Docked { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .s-PAYMENT-PENDING { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }
        .s-PART-RECEIVED { background: #f0fdf4; color: #15803d; border: 1.5px dashed #10b981; }
        .s-ALL-RECEIVED { background: var(--success); color: white; border-color: #059669; }
        .s-OH-HOLD { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .s-CANCELLED { background: #1e293b; color: white; }

        .remarks-editor { 
            width: 100%; 
            padding: 10px; 
            background: #f8fafc; 
            border-radius: 8px; 
            font-size: 12px; 
            border: 1px solid var(--border); 
            font-family: inherit; 
            transition: 0.2s; 
            white-space: pre-wrap; 
            word-break: break-word; 
            line-height: 1.5;
            min-height: 36px;
        }
        .remarks-editor:focus { background: white; border-color: var(--brand); border-width: 1px; box-shadow: 0 0 0 2px var(--brand-light); }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: white; padding: 40px; border-radius: 24px; width: 500px; border: 2px solid var(--brand); }
        
        .btn-main { padding: 12px 20px; border-radius: 12px; font-weight: 800; border: 2px solid transparent; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
        .btn-outline { background: white; border-color: var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; border-color: var(--text-muted); }
        .btn-completed { color: var(--success); border-color: var(--success); }
        .btn-completed.active-toggle { background: var(--success); color: white; }
        
        .age-badge { font-weight: 800; font-size: 11px; color: var(--brand); background: var(--brand-light); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--brand); }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div style="background: white; padding: 50px; border-radius: 30px; width: 400px; text-align: center; border: 3px solid var(--brand);">
            <h2 style="font-weight: 800; margin-bottom: 25px;">SYSTEM ACCESS</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:2px solid var(--border);">
            <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:2px solid var(--border);">
            <button onclick="handleLogin()" class="btn-main btn-primary" style="width:100%; justify-content: center;">Authenticate</button>
            <p id="auth-error" style="color:var(--danger); font-size:11px; margin-top:15px; font-weight:800;"></p>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo-box"><h1>SRD<br>PORTAL 2026</h1></div>
        <div style="flex: 1;">
            <button id="nav-dash" onclick="switchPage('DASH')" class="nav-btn active">PRF TRACKER</button>
            <button id="nav-yard" onclick="switchPage('YARD')" class="nav-btn">Boat Yard Log</button>
            <button id="nav-trans" onclick="switchPage('TRANS')" class="nav-btn">Transactions</button>
        </div>
        <div class="presence-box"><div id="online-list"></div></div>
        <button onclick="handleLogout()" class="nav-btn" style="color: var(--danger); border: 1.5px solid rgba(244, 63, 94, 0.4);">Sign Out</button>
    </nav>

    <div class="wrapper">
        <header class="top-bar">
            <button class="hamburger" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="header-info"><h2 id="page-title">PRF TRACKER</h2></div>
            <div class="search-wrap"><input type="text" id="main-search" placeholder="Search records..." onkeyup="refreshTable()"></div>
            <div class="action-group">
                <button id="btn-toggle-comp" onclick="toggleCompleted()" class="btn-main btn-outline btn-completed" style="display:flex;">Completed PRFs</button>
                <button id="btn-toggle-undocked" onclick="toggleUndocked()" class="btn-main btn-outline btn-completed" style="display:none;">Undocked Assets</button>
                <button onclick="exportPDF()" class="btn-main btn-outline">Export PDF</button>
                <button id="btn-create" onclick="openModal()" class="btn-main btn-primary">+ Create Entry</button>
            </div>
        </header>

        <main class="main-content">
            <div class="table-container">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="entry-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom:25px; font-weight: 800;">NEW ENTRY</h2>
            <div id="prf-form">
                <input type="text" id="m-prf" placeholder="PRF NUMBER" class="remarks-editor" style="margin-bottom:12px; padding:14px; border-radius:12px; border:2px solid var(--border);">
                <input type="text" id="m-asset" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px; border-radius:12px; border:2px solid var(--border);">
                <select id="m-workshop" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:2px solid var(--border); font-family: inherit; font-weight: 700;">
                    <option value="">-- SELECT WORKSHOP --</option>
                    <option value="DAU/LOS">DAU/LOS</option><option value="EEW">EEW</option><option value="MRW">MRW</option>
                    <option value="MSH">MSH</option><option value="MWU">MWU</option><option value="NMU">NMU</option>
                    <option value="OSU">OSU</option><option value="PLU">PLU</option><option value="SMU">SMU</option>
                    <option value="STU">STU</option><option value="ADM">ADM</option><option value="INV">INV</option>
                </select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <button onclick="savePRF(false)" class="btn-main btn-outline" style="justify-content:center;">Draft</button>
                    <button onclick="savePRF(true)" class="btn-main btn-primary" style="justify-content:center;">Upload & Link</button>
                </div>
            </div>
            <div id="yard-form" style="display:none;">
                <input type="text" id="y-slot" placeholder="SLOT NUMBER" class="remarks-editor" style="margin-bottom:12px; padding:14px; border-radius:12px; border:2px solid var(--border);">
                <input type="text" id="y-vessel" placeholder="Asset Name" class="remarks-editor" style="margin-bottom:12px; padding:14px; border-radius:12px; border:2px solid var(--border);">
                <input type="text" id="y-owner" placeholder="OWNER NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px; border-radius:12px; border:2px solid var(--border);">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <div>
                        <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">DOCKING DATE</label>
                        <input type="date" id="y-docked" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--border);">
                    </div>
                    <div>
                        <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">EST. UNDOCK DATE</label>
                        <input type="date" id="y-est-undock" style="width:100%; padding:14px; border-radius:12px; border:2px solid var(--border);">
                    </div>
                </div>
                <button onclick="saveYardEntry()" class="btn-main btn-primary" style="width:100%; justify-content:center;">Register Vessel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw", 
            authDomain: "srd-portal-1234.firebaseapp.com", 
            projectId: "srd-portal-1234", 
            databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com",
            storageBucket: "srd-portal-1234.firebasestorage.app", 
            messagingSenderId: "286585731956", 
            appId: "1:286585731956:web:47641bcf34033b014f4a21" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let logs = [], yardLogs = [], transactionLogs = [], currentPage = 'DASH';
        let showCompleted = false;
        let showUndocked = false;

        const STATUS_OPTIONS = ["PENDING", "ITEM CREATION", "PR/MTR-RAISED", "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", "ALL RECEIVED", "OH-HOLD", "CANCELLED"];
        const YARD_STATUS = ["Docked", "Undocked"];

        // GLOBAL BINDINGS
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(() => alert("Access Denied"));
        window.handleLogout = () => signOut(auth);
        
        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) { initData(); setupPresence(user); }
        });

        function setupPresence(user) {
            const myStatusRef = ref(db, `/status/${user.uid}`);
            onValue(ref(db, '.info/connected'), (snap) => { if (snap.val()) { onDisconnect(myStatusRef).set({ state: 'offline', email: user.email }).then(() => set(myStatusRef, { state: 'online', email: user.email })); }});
            onValue(ref(db, '/status'), (snap) => {
                const data = snap.val(); let html = '';
                for (let id in data) if (data[id].state === 'online') html += `<div class="u-row"><span class="u-dot"></span>${data[id].email.split('@')[0].toUpperCase()}</div>`;
                document.getElementById('online-list').innerHTML = html;
            });
        }

        function initData() {
            onValue(ref(db, 'prf_logs'), snap => {
                const val = snap.val();
                logs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                if(currentPage === 'DASH') refreshTable();
            });
            onValue(ref(db, 'yard_logs'), snap => {
                const val = snap.val();
                yardLogs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                if(currentPage === 'YARD') refreshTable();
            });
            onValue(ref(db, 'transactions'), snap => {
                const val = snap.val();
                transactionLogs = val ? Object.values(val).reverse() : [];
                if(currentPage === 'TRANS') refreshTable();
            });
        }

        window.toggleSidebar = () => document.querySelector('.sidebar').classList.toggle('hidden');

        window.switchPage = (page) => {
            currentPage = page;
            showCompleted = false; 
            showUndocked = false;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + page.toLowerCase()).classList.add('active');
            
            const titles = { 'YARD': 'BOAT YARD LOG', 'DASH': 'PRF TRACKER', 'TRANS': 'TRANSACTIONS' };
            document.getElementById('page-title').innerText = titles[page];
            
            document.getElementById('btn-create').style.display = (page === 'TRANS') ? 'none' : 'block';
            document.getElementById('btn-toggle-comp').style.display = (page === 'DASH') ? 'flex' : 'none';
            document.getElementById('btn-toggle-comp').classList.remove('active-toggle');
            document.getElementById('btn-toggle-undocked').style.display = (page === 'YARD') ? 'flex' : 'none';
            document.getElementById('btn-toggle-undocked').classList.remove('active-toggle');
            
            refreshTable();
        };

        window.toggleCompleted = () => {
            showCompleted = !showCompleted;
            const btn = document.getElementById('btn-toggle-comp');
            btn.classList.toggle('active-toggle', showCompleted);
            document.getElementById('page-title').innerText = showCompleted ? 'COMPLETED PRFs' : 'PRF TRACKER';
            refreshTable();
        };

        window.toggleUndocked = () => {
            showUndocked = !showUndocked;
            const btn = document.getElementById('btn-toggle-undocked');
            btn.classList.toggle('active-toggle', showUndocked);
            document.getElementById('page-title').innerText = showUndocked ? 'UNDOCKED ASSETS' : 'BOAT YARD LOG';
            refreshTable();
        };

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');

            if (currentPage === 'YARD') {
                head.innerHTML = `<tr><th style="width:80px;">Slot</th><th>Asset Name</th><th>Owner</th><th style="width:110px;">Docked</th><th style="width:110px;">Est. Undock</th><th style="width:150px;">Status</th><th style="width:80px;">Age</th><th>Actual Undock</th><th style="width:40px;"></th></tr>`;
                const filtered = yardLogs.filter(l => {
                    const matches = l.name?.toUpperCase().includes(q) || l.owner?.toUpperCase().includes(q) || l.slot?.toUpperCase().includes(q);
                    return showUndocked ? (matches && l.status === 'Undocked') : (matches && l.status !== 'Undocked');
                });
                body.innerHTML = filtered.map(l => {
                    const start = new Date(l.docked);
                    const end = l.undocked ? new Date(l.undocked) : new Date();
                    const age = Math.floor((end - start) / (1000 * 60 * 60 * 24)) || 0;
                    return `<tr>
                        <td style="font-weight:800; color:var(--brand);"><input class="remarks-editor" value="${l.slot}" onblur="updateYard('${l.id}', 'slot', this.value)"></td>
                        <td><input class="remarks-editor" value="${l.name}" style="font-weight:700;" onblur="updateYard('${l.id}', 'name', this.value)"></td>
                        <td><input class="remarks-editor" value="${l.owner}" onblur="updateYard('${l.id}', 'owner', this.value)"></td>
                        <td><input type="date" value="${l.docked}" class="remarks-editor" onchange="updateYard('${l.id}', 'docked', this.value)"></td>
                        <td><input type="date" value="${l.estUndock || ''}" class="remarks-editor" onchange="updateYard('${l.id}', 'estUndock', this.value)"></td>
                        <td>
                            <select class="status-select ${l.status === 'Docked' ? 's-Docked' : 's-Undocked'}" onchange="updateYard('${l.id}', 'status', this.value)">
                                ${YARD_STATUS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}
                            </select>
                        </td>
                        <td><span class="age-badge">${age}D</span></td>
                        <td><input type="date" value="${l.undocked || ''}" class="remarks-editor" onchange="updateYard('${l.id}', 'undocked', this.value)"></td>
                        <td><button onclick="deleteYard('${l.id}')" style="background:none; border:none; cursor:pointer; color:var(--danger); font-size:18px;">&times;</button></td>
                    </tr>`;
                }).join('');
            } else if (currentPage === 'TRANS') {
                head.innerHTML = `<tr><th style="width:180px;">Timestamp</th><th style="width:120px;">Reference</th><th>Action Type</th><th>Details</th><th>User</th></tr>`;
                const filtered = transactionLogs.filter(a => a.prf?.toUpperCase().includes(q) || a.action?.toUpperCase().includes(q) || a.user?.toUpperCase().includes(q));
                body.innerHTML = filtered.map(a => `<tr>
                    <td style="color:var(--text-muted); font-size:11px;">${a.time}</td>
                    <td style="font-weight:800; color:var(--brand);">${a.prf}</td>
                    <td style="font-weight:700;">${a.action}</td>
                    <td style="font-style:italic; color:var(--text-muted);">${a.details}</td>
                    <td style="font-weight:800;">${a.user}</td>
                </tr>`).join('');
            } else {
                head.innerHTML = `<tr><th style="width:100px;">Date</th><th style="width:120px;">PRF #</th><th>Asset Name</th><th style="width:100px;">Workshop</th><th style="width:160px;">Status</th><th style="width:140px;">Due Date</th><th style="min-width:300px;">Remarks</th><th style="width:40px;"></th></tr>`;
                const filtered = logs.filter(l => {
                    const matches = (l.prf?.toUpperCase().includes(q) || l.asset?.toUpperCase().includes(q) || l.workshop?.toUpperCase().includes(q));
                    return showCompleted ? (matches && l.status === 'ALL RECEIVED') : (matches && l.status !== 'ALL RECEIVED');
                });
                body.innerHTML = filtered.map(l => {
                    const sClass = `s-${l.status.replace(/[/ ]/g, '-')}`;
                    return `<tr>
                        <td>${l.date}</td>
                        <td style="font-weight:800; color:var(--brand);">${l.prf}</td>
                        <td style="font-weight:700;">${l.asset}</td>
                        <td style="font-size:10px; font-weight:700; color:var(--text-muted);">${l.workshop}</td>
                        <td>
                            <select class="status-select ${sClass}" onchange="updateField('${l.id}', 'status', this.value, '${l.prf}')">
                                ${STATUS_OPTIONS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}
                            </select>
                        </td>
                        <td><input type="date" value="${l.eta || ''}" class="remarks-editor" onchange="updateField('${l.id}', 'eta', this.value, '${l.prf}')"></td>
                        <td><div class="remarks-editor" contenteditable="true" onblur="updateField('${l.id}', 'remarks', this.innerText.trim().toUpperCase(), '${l.prf}')">${l.remarks || ''}</div></td>
                        <td><button onclick="deleteRow('${l.id}')" style="background:none; border:none; cursor:pointer; color:#cbd5e1; font-size:18px;">&times;</button></td>
                    </tr>`;
                }).join('');
            }
        };

        window.savePRF = (redirect) => {
            const p = document.getElementById('m-prf').value.toUpperCase(), a = document.getElementById('m-asset').value.toUpperCase(), w = document.getElementById('m-workshop').value;
            if(!p || !a || !w) return alert("Required");
            push(ref(db, 'prf_logs'), { date: new Date().toLocaleDateString('en-GB'), rawDate: new Date().toISOString(), prf: p, asset: a, workshop: w, status: 'PENDING', eta: '', remarks: '' });
            closeModal();
            if(redirect) window.open("https://forms.office.com/pages/responsepage.aspx?id=rS-35FLkcEy4rMmBiUUcM-wq0ZU8I9BHssORFyfEW95UN0ZMM1gxR1YwUDZKMkNHMkhFMUdMRzlRSS4u", "_blank");
        };

        window.saveYardEntry = () => {
            const s = document.getElementById('y-slot').value, v = document.getElementById('y-vessel').value, 
                  o = document.getElementById('y-owner').value, d = document.getElementById('y-docked').value,
                  e = document.getElementById('y-est-undock').value;
            if(!s || !v || !d) return alert("Required");
            push(ref(db, 'yard_logs'), { slot: s, name: v, owner: o, docked: d, estUndock: e, status: 'Docked', undocked: '' });
            closeModal();
        };

        window.updateField = (id, field, val, prf) => {
            update(ref(db, `prf_logs/${id}`), { [field]: val });
            push(ref(db, 'transactions'), { time: new Date().toLocaleString(), user: auth.currentUser.email.split('@')[0].toUpperCase(), action: `PRF Edit: ${field}`, prf: prf, details: val });
        };

        window.updateYard = (id, field, val) => {
            const upd = { [field]: val };
            if (field === 'undocked' && val !== "") upd.status = "Undocked";
            update(ref(db, `yard_logs/${id}`), upd);
            push(ref(db, 'transactions'), { time: new Date().toLocaleString(), user: auth.currentUser.email.split('@')[0].toUpperCase(), action: `Yard Edit: ${field}`, prf: 'YARD', details: val });
        };

        window.openModal = () => {
            const isYard = currentPage === 'YARD';
            document.getElementById('modal-title').innerText = isYard ? 'REGISTER VESSEL' : 'NEW PRF ENTRY';
            document.getElementById('prf-form').style.display = isYard ? 'none' : 'block';
            document.getElementById('yard-form').style.display = isYard ? 'block' : 'none';
            document.getElementById('entry-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('entry-modal').style.display = 'none';

        window.deleteRow = (id) => { 
            if(confirm('Delete permanently?')) {
                const item = logs.find(l => l.id === id);
                push(ref(db, 'transactions'), { 
                    time: new Date().toLocaleString(), 
                    user: auth.currentUser.email.split('@')[0].toUpperCase(), 
                    action: 'DELETED PRF', 
                    prf: item?.prf || 'N/A', 
                    details: `Asset: ${item?.asset}` 
                });
                remove(ref(db, `prf_logs/${id}`)); 
            }
        };

        window.deleteYard = (id) => { 
            if(confirm('Delete vessel?')) {
                const item = yardLogs.find(l => l.id === id);
                push(ref(db, 'transactions'), { 
                    time: new Date().toLocaleString(), 
                    user: auth.currentUser.email.split('@')[0].toUpperCase(), 
                    action: 'DELETED YARD ENTRY', 
                    prf: 'YARD', 
                    details: `Vessel: ${item?.name}` 
                });
                remove(ref(db, `yard_logs/${id}`)); 
            }
        };

        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const q = document.getElementById('main-search').value.toUpperCase();
            let data, head;
            const dateStr = new Date().toLocaleString('en-GB');
            const reportName = (currentPage === 'TRANS') ? 'TRANSACTIONS' : 
                               (currentPage === 'YARD' ? (showUndocked ? 'UNDOCKED ASSETS' : 'BOAT YARD LOG') :
                               (showCompleted ? 'COMPLETED PRFS' : currentPage));

            if(currentPage === 'YARD') {
                head = [['SLOT', 'Asset Name', 'OWNER', 'DOCKED', 'EST. UNDOCK', 'STATUS', 'AGE', 'ACTUAL UNDOCK']];
                const filteredYard = yardLogs.filter(l => {
                    const matches = l.name?.toUpperCase().includes(q) || l.owner?.toUpperCase().includes(q);
                    return showUndocked ? (matches && l.status === 'Undocked') : (matches && l.status !== 'Undocked');
                });
                data = filteredYard.map(l => {
                    const age = Math.floor(( (l.undocked?new Date(l.undocked):new Date()) - new Date(l.docked)) / (1000*60*60*24)) || 0;
                    return [l.slot, l.name, l.owner, l.docked, l.estUndock || 'N/A', l.status, age + " Days", l.undocked || 'N/A'];
                });
            } else if (currentPage === 'TRANS') {
                head = [['TIMESTAMP', 'REF', 'ACTION', 'DETAILS', 'USER']];
                data = transactionLogs.filter(a => a.prf?.toUpperCase().includes(q) || a.action?.toUpperCase().includes(q)).map(a => [a.time, a.prf, a.action, a.details, a.user]);
            } else {
                head = [['DATE', 'PRF #', 'ASSET NAME', 'WORKSHOP', 'STATUS', 'DUE DATE', 'REMARKS']];
                const filterLogs = logs.filter(l => {
                    const matches = l.prf?.toUpperCase().includes(q) || l.asset?.toUpperCase().includes(q);
                    return showCompleted ? (matches && l.status === 'ALL RECEIVED') : (matches && l.status !== 'ALL RECEIVED');
                });
                data = filterLogs.map(l => [l.date, l.prf, l.asset, l.workshop, l.status, l.eta || 'N/A', l.remarks || '']);
            }

            doc.setFontSize(18);
            doc.text(`SRD PORTAL: ${reportName} REPORT`, 14, 15);
            doc.setFontSize(10);
            doc.text(`Report Exported On: ${dateStr}`, 14, 22);
            doc.autoTable({ startY: 28, head: head, body: data, theme: 'grid', headStyles: { fillColor: [99, 102, 241] }, styles: { fontSize: 8 } });
            doc.save(`SRD_${reportName.replace(/ /g, '_')}_${new Date().toISOString().split('T')[0]}.pdf`);
        };
    </script>
</body>
</html>
