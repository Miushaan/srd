<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD PRF TRACKING | 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #fdfdfd; --side: #0f172a; --brand: #6366f1; --brand-light: #e0e7ff;
            --success: #10b981; --border: #f1f5f9; --text-main: #1e293b;
            --text-muted: #64748b; --danger: #f43f5e; --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--side); color: white; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .logo-box { margin-bottom: 50px; padding: 0 10px; border-left: 3px solid var(--brand); padding-left: 15px; }
        .logo-box h1 { font-size: 18px; font-weight: 800; line-height: 1.2; color: #fff; text-transform: uppercase; }

        .nav-btn { width: 100%; padding: 14px 18px; border-radius: 12px; border: none; background: transparent; color: #94a3b8; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 8px; text-transform: uppercase; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }

        /* Main Layout */
        .wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #f8fafc; }
        .top-bar { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .search-wrap { position: relative; width: 450px; }
        .search-wrap input { width: 100%; padding: 12px 20px; border-radius: 14px; border: 1px solid var(--border); background: #f8fafc; font-size: 14px; }

        /* Table Area */
        .main-content { flex: 1; padding: 30px 40px; overflow: auto; }
        .table-container { background: white; border-radius: 24px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; table-layout: fixed; }
        thead th { position: sticky; top: 0; z-index: 10; background: #fbfcfd; padding: 20px; text-align: left; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        tbody td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }

        /* Remarks - Auto Expanding */
        .remarks-editor { width: 100%; min-height: 40px; padding: 10px; background: #f8fafc; border-radius: 10px; border: 1px solid transparent; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; transition: 0.2s; }
        .remarks-editor:focus { background: white; border-color: var(--brand-light); outline: none; }

        /* Status Colors */
        .status-select { padding: 8px; border-radius: 10px; font-size: 10px; font-weight: 800; width: 100%; border: none; cursor: pointer; appearance: none; text-align: center; }
        .s-PENDING { background: #f1f5f9; color: #475569; }
        .s-PO-RAISED { background: #dcfce7; color: #166534; }
        .s-ALL-RECEIVED { background: var(--success); color: white; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: white; padding: 45px; border-radius: 28px; width: 550px; max-height: 85vh; display: flex; flex-direction: column; }
        .btn-main { padding: 16px 28px; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-primary { background: var(--brand); color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div style="background: white; padding: 60px; border-radius: 35px; width: 450px; text-align: center;">
            <h2 style="font-weight: 800; margin-bottom: 30px;">SYSTEM ACCESS</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:16px; margin-bottom:15px; border-radius:14px; border:1px solid var(--border);">
            <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:16px; margin-bottom:25px; border-radius:14px; border:1px solid var(--border);">
            <button onclick="handleLogin()" class="btn-main btn-primary" style="width:100%">Authenticate</button>
            <p id="auth-error" style="color:var(--danger); font-size:12px; margin-top:20px; font-weight:800;"></p>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo-box"><h1>SRD PRF<br>TRACKING PORTAL</h1></div>
        <button class="nav-btn active">Dashboard</button>
        <button onclick="showAudit()" class="nav-btn">Audit Trail</button>
        <button onclick="exportPDF()" class="nav-btn">Export PDF</button>
        <button onclick="handleLogout()" class="nav-btn" style="margin-top:20px; color: #f43f5e;">Sign Out</button>
        <div id="online-list" style="margin-top:auto; font-size: 11px; color:#cbd5e1;"></div>
    </nav>

    <div class="wrapper">
        <header class="top-bar">
            <div class="search-wrap"><input type="text" id="main-search" placeholder="Search entries..." onkeyup="refreshTable()"></div>
            <button onclick="openModal()" class="btn-main btn-primary">+ New Entry</button>
        </header>

        <main class="main-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 110px;">Date</th>
                            <th style="width: 130px;">PRF #</th>
                            <th style="width: 180px;">Asset Name</th>
                            <th style="width: 100px;">Workshop</th>
                            <th style="width: 180px;">Status</th>
                            <th style="width: 150px;">Due Date</th>
                            <th style="width: auto;">Detailed Remarks</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="audit-modal" class="overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal">
            <h2 style="margin-bottom:20px; font-weight:800;">AUDIT TRAIL</h2>
            <div id="audit-content" style="overflow-y:auto; flex:1; border-top:1px solid #eee; padding-top:10px;"></div>
            <button onclick="document.getElementById('audit-modal').style.display='none'" class="btn-main" style="margin-top:20px; background:#eee;">Close</button>
        </div>
    </div>

    <div id="prf-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 style="margin-bottom:30px; font-weight: 800;">NEW PRF RECORD</h2>
            <input type="text" id="m-prf" placeholder="PRF NUMBER" style="width:100%; padding:16px; margin-bottom:15px; border-radius:14px; border:1px solid var(--border);">
            <input type="text" id="m-asset" placeholder="ASSET NAME" style="width:100%; padding:16px; margin-bottom:15px; border-radius:14px; border:1px solid var(--border);">
            <select id="m-workshop" style="width:100%; padding:16px; margin-bottom:25px; border-radius:14px; border:1px solid var(--border);">
                <option value="">-- SELECT WORKSHOP --</option>
                <option value="DAU/LOS">DAU/LOS</option>
                <option value="EEW">EEW</option>
                <option value="MRW">MRW</option>
                <option value="MSH">MSH</option>
                <option value="MWU">MWU</option>
                <option value="NMU">NMU</option>
                <option value="OSU">OSU</option>
                <option value="PLU">PLU</option>
                <option value="SMU">SMU</option>
                <option value="STU">STU</option>
                <option value="ADM">ADM</option>
                <option value="INV">INV</option>
            </select>
            <button onclick="savePRF()" class="btn-main btn-primary" style="width:100%">Save Entry</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw",
            authDomain: "srd-portal-1234.firebaseapp.com",
            projectId: "srd-portal-1234",
            storageBucket: "srd-portal-1234.firebasestorage.app",
            messagingSenderId: "286585731956",
            appId: "1:286585731956:web:47641bcf34033b014f4a21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let logs = [], auditLogs = [];

        const STATUS_OPTIONS = ["PENDING", "ITEM CREATION", "PR/MTR-RAISED", "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", "ALL RECEIVED", "OH-HOLD", "CANCELLED"];

        window.handleLogin = () => {
            signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(() => alert("Denied"));
        };
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) { initData(); }
        });

        function initData() {
            onValue(ref(db, 'prf_logs'), snap => {
                const val = snap.val();
                logs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                logs.sort((a,b) => new Date(b.rawDate || 0) - new Date(a.rawDate || 0));
                refreshTable();
            });
            onValue(ref(db, 'audit_trail'), snap => {
                const val = snap.val();
                auditLogs = val ? Object.values(val).reverse() : [];
            });
        }

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const filtered = logs.filter(l => (l.prf?.includes(q) || l.asset?.includes(q)));
            document.getElementById('table-body').innerHTML = filtered.map(l => `
                <tr>
                    <td>${l.date}</td>
                    <td style="font-weight:800; color:var(--brand);">${l.prf}</td>
                    <td style="font-weight:700;">${l.asset}</td>
                    <td>${l.workshop}</td>
                    <td>
                        <select class="status-select s-${l.status.replace(/[/ ]/g, '-')}" onchange="updateField('${l.id}', 'status', this.value, '${l.prf}')">
                            ${STATUS_OPTIONS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}
                        </select>
                    </td>
                    <td><input type="date" value="${l.eta || ''}" onchange="updateField('${l.id}', 'eta', this.value, '${l.prf}')"></td>
                    <td><div class="remarks-editor" contenteditable="true" onblur="updateField('${l.id}', 'remarks', this.innerText.toUpperCase(), '${l.prf}')">${l.remarks || ''}</div></td>
                    <td><button onclick="deleteRow('${l.id}')">×</button></td>
                </tr>
            `).join('');
        };

        window.updateField = (id, field, val, prf) => {
            update(ref(db, `prf_logs/${id}`), { [field]: val });
            push(ref(db, 'audit_trail'), {
                time: new Date().toLocaleString(),
                user: auth.currentUser.email.split('@')[0].toUpperCase(),
                action: `Updated ${field}`,
                prf: prf,
                details: val
            });
        };

        window.showAudit = () => {
            document.getElementById('audit-modal').style.display = 'flex';
            document.getElementById('audit-content').innerHTML = auditLogs.slice(0, 50).map(a => `
                <div style="padding:10px; border-bottom:1px solid #f9f9f9; font-size:11px;">
                    <b style="color:var(--brand)">${a.time}</b> | <b>${a.user}</b><br>
                    PRF: ${a.prf} -> <span style="color:var(--danger)">${a.action}</span> (${a.details})
                </div>
            `).join('');
        };

        window.savePRF = () => {
            const p = document.getElementById('m-prf').value.toUpperCase();
            const a = document.getElementById('m-asset').value.toUpperCase();
            const w = document.getElementById('m-workshop').value;
            if(!p || !a || !w) return;
            push(ref(db, 'prf_logs'), { date: new Date().toLocaleDateString('en-GB'), rawDate: new Date().toISOString(), prf: p, asset: a, workshop: w, status: 'PENDING', eta: '', remarks: '' });
            closeModal();
        };

        window.deleteRow = (id) => { if(confirm('Delete?')) remove(ref(db, `prf_logs/${id}`)); };
        window.openModal = () => document.getElementById('prf-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('prf-modal').style.display = 'none';
        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l');
            doc.autoTable({ head: [['DATE', 'PRF', 'ASSET', 'STATUS', 'REMARKS']], body: logs.map(l => [l.date, l.prf, l.asset, l.status, l.remarks]) });
            doc.save('SRD_REPORT.pdf');
        };
    </script>
</body>
</html>
