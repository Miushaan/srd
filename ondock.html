<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD | ON-DOCK MANAGEMENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --side: #0f172a; --brand: #6366f1; --border: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; --success: #10b981; --danger: #f43f5e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: var(--side); color: white; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 18px; margin-bottom: 40px; border-left: 3px solid var(--brand); padding-left: 15px; text-transform: uppercase; }
        .nav-link { width: 100%; padding: 14px; border-radius: 12px; color: #94a3b8; text-decoration: none; font-size: 12px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; text-transform: uppercase; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--brand); color: white; }

        /* Content Area */
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; padding: 30px 40px; overflow-y: auto; }

        /* Table Design */
        .table-card { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #fbfcfd; padding: 18px 20px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
        
        tr.undocked { background: #f9fafb; opacity: 0.6; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .b-internal { background: #e0f2fe; color: #0369a1; }
        .b-external { background: #fef2f2; color: #991b1b; }
        .b-inter-division { background: #f0fdf4; color: #166534; }
        
        .prf-pill { background: #6366f1; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 4px; font-family: monospace; font-weight: 600; }
        
        /* Modal UI */
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 40px; border-radius: 24px; width: 450px; border: 1px solid var(--border); }
        .modal h2 { margin-bottom: 20px; font-weight: 800; font-size: 18px; }
        .btn { padding: 12px 24px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); font-family: inherit; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">SRD PORTAL</div>
        <a href="index.html" class="nav-link">Live Dashboard</a>
        <a href="ondock.html" class="nav-link active">ON-DOCK</a>
    </nav>

    <div class="wrapper">
        <header class="header">
            <h2 style="font-weight: 800;">LIVE ON-DOCK TRACKING</h2>
            <button class="btn btn-primary" onclick="openDockModal()">+ Dock a Vessel</button>
        </header>
        <main class="main">
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Docked Date</th>
                            <th>Asset Name</th>
                            <th>Hull Type</th>
                            <th>Length</th>
                            <th>Type</th>
                            <th>Age (Days)</th>
                            <th>Related PRFs</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="vessel-table">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="dock-modal" class="overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal">
            <h2>DOCK NEW VESSEL</h2>
            <label style="font-size:10px; font-weight:800; color:var(--text-muted);">DATE DOCKED</label>
            <input type="date" id="d-date">
            <input type="text" id="d-asset" placeholder="ASSET NAME (E.G. BARGE 10)">
            <input type="text" id="d-hull" placeholder="HULL TYPE">
            <input type="text" id="d-len" placeholder="LENGTH (M)">
            <select id="d-type">
                <option value="Internal">Internal</option>
                <option value="Inter-Division">Inter-Division</option>
                <option value="External">External</option>
            </select>
            <button class="btn btn-primary" style="width:100%" onclick="saveVessel()">Confirm Docking</button>
        </div>
    </div>

    <div id="undock-modal" class="overlay" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal">
            <h2>UNDOCK VESSEL</h2>
            <p id="undock-name" style="margin-bottom:15px; font-weight:700; color:var(--brand);"></p>
            <label style="font-size:10px; font-weight:800; color:var(--text-muted);">DATE UNDOCKED</label>
            <input type="date" id="u-date">
            <button class="btn btn-primary" style="width:100%; background:var(--danger);" onclick="confirmUndock()">Confirm Undock</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // CONFIGURATION
        const firebaseConfig = { 
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw", 
            authDomain: "srd-portal-1234.firebaseapp.com", 
            projectId: "srd-portal-1234", 
            databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let livePrfs = [];
        let currentVesselId = null;

        // 1. LISTEN LIVE TO PRF LOGS (From index.html)
        onValue(ref(db, 'prf_logs'), snap => {
            const data = snap.val();
            livePrfs = data ? Object.values(data) : [];
            // We don't call loadVessels here because the listener below handles it
        });

        // 2. LISTEN LIVE TO VESSEL LOGS (This page)
        onValue(ref(db, 'vessels'), snap => {
            const val = snap.val();
            const list = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
            
            // SORTING: Active on top, Undocked (history) at bottom
            list.sort((a, b) => (a.undockedDate ? 1 : 0) - (b.undockedDate ? 1 : 0));

            const tbody = document.getElementById('vessel-table');
            tbody.innerHTML = list.map(v => {
                // Calculate Age
                const start = new Date(v.dockedDate);
                const end = v.undockedDate ? new Date(v.undockedDate) : new Date();
                const age = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
                
                // Cross-reference Asset Name with Live PRFs
                const matched = livePrfs
                    .filter(p => p.asset === v.assetName)
                    .map(p => `<span class="prf-pill">${p.prf}</span>`)
                    .join('');

                const isUndocked = !!v.undockedDate;

                return `
                    <tr class="${isUndocked ? 'undocked' : ''}">
                        <td>${v.dockedDate}</td>
                        <td style="font-weight:800; color:var(--brand);">${v.assetName}</td>
                        <td style="color:var(--text-muted);">${v.hullType}</td>
                        <td>${v.length}m</td>
                        <td><span class="badge b-${v.vesselType.toLowerCase()}">${v.vesselType}</span></td>
                        <td style="font-weight:700;">${age} Days</td>
                        <td>${matched || '<span style="color:#ddd; font-size:10px;">NONE</span>'}</td>
                        <td style="font-weight:800; font-size:11px;">
                            ${isUndocked ? `<span style="color:var(--text-muted)">UNDOCKED (${v.undockedDate})</span>` : `<span style="color:var(--success)">ON DOCK</span>`}
                        </td>
                        <td>
                            ${!isUndocked ? `<button class="btn" style="padding:6px 12px; font-size:10px; background:#f1f5f9; color:var(--text-main);" onclick="openUndockModal('${v.id}','${v.assetName}')">Undock</button>` : '—'}
                        </td>
                    </tr>
                `;
            }).join('');
        });

        // MODAL FUNCTIONS
        window.openDockModal = () => {
            document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('dock-modal').style.display = 'flex';
        };

        window.saveVessel = () => {
            const asset = document.getElementById('d-asset').value.toUpperCase().trim();
            if(!asset) return alert("Asset Name is required!");

            push(ref(db, 'vessels'), {
                dockedDate: document.getElementById('d-date').value,
                assetName: asset,
                hullType: document.getElementById('d-hull').value.toUpperCase(),
                length: document.getElementById('d-len').value,
                vesselType: document.getElementById('d-type').value,
                undockedDate: null
            });
            document.getElementById('dock-modal').style.display = 'none';
        };

        window.openUndockModal = (id, name) => {
            currentVesselId = id;
            document.getElementById('undock-name').innerText = name;
            document.getElementById('u-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('undock-modal').style.display = 'flex';
        };

        window.confirmUndock = () => {
            const uDate = document.getElementById('u-date').value;
            update(ref(db, `vessels/${currentVesselId}`), { undockedDate: uDate });
            document.getElementById('undock-modal').style.display = 'none';
        };
    </script>
</body>
</html>
